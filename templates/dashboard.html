<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9fafc;
            color: #333;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            color: #222;
            margin-bottom: 10px;
        }

        .welcome {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #444;
        }

        .user-info {
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .user-info p {
            font-size: 1rem;
        }

        .nav-links a {
            display: block;
            background-color: #0056b3;
            color: #fff;
            text-decoration: none;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 8px;
            text-align: center;
            transition: background-color 0.3s ease;
            font-weight: 500;
        }

        .nav-links a:hover {
            background-color: #004494;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .nav-links a {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Home Page</h1>
        <p class="welcome">Welcome, {{ user.name }} 👋</p>
        
        

        <div class="nav-links">
            <a href="{{ url_for('main.create_resume') }}">Create Resume</a>
            <a href="{{ url_for('main.resume_enhancer') }}">Resume Enhancement</a>
            <a href="{{ url_for('main.cover_letter_generator') }}">Cover Letter Generator</a>
            
            <a href="{{ url_for('main.logout') }}">Logout</a>
        </div>
    </div>
</body>
</html>
