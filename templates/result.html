<!DOCTYPE html>
<html>
<head>
    <title>Parsed Files</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #555;
        }
        p {
            white-space: pre-wrap;
        }
        .btn-group {
            margin-top: 20px;
        }
        .btn-group button {
            padding: 10px 18px;
            margin-right: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn-group button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>Parsed Files</h1>
    <p>Extracted text from your uploaded files:</p>

    <h2>Resume Text</h2>
    <p>{{ resume_text }}</p>

    <h2>Job Description Text</h2>
    <p>{{ jd_text }}</p>

    <div class="btn-group">
        <button onclick="window.location.href='{{ url_for('main.resume_enhancer') }}'">Back to Resume Enhancer</button>
        <button onclick="window.location.href='{{ url_for('main.dashboard') }}'">Back to Dashboard</button>
    </div>

</body>
</html>
