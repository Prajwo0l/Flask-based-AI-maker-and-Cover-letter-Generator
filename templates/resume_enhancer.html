<!DOCTYPE html>
<html>
<head>
    <title>Resume Enhancer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f7f7f7;
        }

        h1 {
            color: #333;
        }

        .error {
            color: red;
        }

        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="file"] {
            margin-bottom: 10px;
        }

        .btn-group {
            margin-top: 20px;
        }

        .btn-group input[type="submit"] {
            margin-right: 10px;
            padding: 10px 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-group input[type="submit"]:hover {
            background-color: #45a049;
        }

        .back-button {
            margin-top: 30px;
            padding: 10px 18px;
            background-color: #555;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .back-button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <h1>Resume Enhancer</h1>
    <p>Upload your resume and job description to get started</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('main.resume_enhancer') }}" enctype="multipart/form-data">
        <label>Upload Resume (PDF/DOCX)</label>
        <input type="file" name="resume" accept=".pdf,.docx" required>

        <label>Upload Job Description (PDF/DOCX/TXT)</label>
        <input type="file" name="jd" accept=".pdf,.docx,.txt" required>

        <div class="btn-group">
            
            <input type="submit" name="action" value="ATS Analysis">
        </div>
    </form>

    <button class="back-button" onclick="window.location.href='{{ url_for('main.dashboard') }}'">
        Back to Home
    </button>
</body>
</html>
